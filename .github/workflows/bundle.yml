name: Bundle keyword files

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - '*.md'

concurrency:
  group: bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build dist/bundle.json
        run: python3 scripts/bundle.py

      - name: Commit bundle
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/bundle.json
          git diff --staged --quiet || git commit -m "chore: rebuild bundle [skip ci]"
          git push
